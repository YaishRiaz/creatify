name: Creatify View Polling

on:
  schedule:
    # Runs every 6 hours: midnight, 6am, noon, 6pm (UTC)
    # In Sri Lanka time (UTC+5:30): 5:30am, 11:30am, 5:30pm, 11:30pm
    - cron: '0 */6 * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  poll-views:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Trigger Poll Cycle
        run: |
          echo "Starting Creatify poll cycle at $(date)"
          
          response=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/poll" \
            -H "x-poll-secret: ${{ secrets.POLL_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 300)
          
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          
          echo "Response code: $http_code"
          echo "Response body: $body"
          
          if [ "$http_code" != "200" ]; then
            echo "Poll cycle failed with status $http_code"
            exit 1
          fi
          
          echo "Poll cycle completed successfully"
      
      - name: Report Results
        if: always()
        run: |
          echo "Poll workflow finished at $(date)"